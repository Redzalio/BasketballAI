[pytest]
# HoopTracker test suite: pure, torch-free logic only.
# Run from the repo root:  python -m pytest
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q
# polyfit emits a benign RankWarning for the perfectly-straight MAKE arc;
# tests catch it locally, but keep the run output clean here too.
filterwarnings =
    ignore::numpy.exceptions.RankWarning
